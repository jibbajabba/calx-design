<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 46 900 465" xmlns="http://www.w3.org/2000/svg"
     font-family="Georgia, 'Times New Roman', serif">

  <!-- ═══════════════════════════════════════════════════
       FIGURE TITLE + CAPTION
  ════════════════════════════════════════════════════ -->
  <text x="40" y="22" font-size="9" font-weight="700" letter-spacing="1.2"
        fill="#444" font-family="'DM Mono', 'Courier New', monospace"
        text-decoration="none">FIGURE 1.0 · WHERE POLYMER LEAVES THE TIRE — AND WHERE THE COST LANDS</text>
  <text x="40" y="38" font-size="9.5" fill="#666" font-family="Georgia, serif">
    Below the dashed line: TWP released at each stage.  Above the dashed line: cost burden today (coral) versus 2026–28 (indigo).
  </text>

  <!-- ═══════════════════════════════════════════════════
       COLUMN X CENTRES (5 stages)
       Raw mat=160  Mfg=300  Distribution=440  Use=600  EOL=760
  ════════════════════════════════════════════════════ -->

  <!-- ── COST AXIS LABEL ── -->
  <text x="872" y="188" font-size="10" fill="#888" font-family="Georgia, serif"
        text-anchor="middle" transform="rotate(90,872,188)">cost</text>

  <!-- ── DASHED BASELINE ── -->
  <line x1="80" y1="248" x2="840" y2="248"
        stroke="#bbb" stroke-width="1" stroke-dasharray="5 4"/>

  <!-- ── TODAY / 2026-28 LEGEND ── -->
  <rect x="80" y="254" width="10" height="10" fill="#C0503A" rx="1"/>
  <text x="95" y="263" font-size="10" fill="#C0503A" font-family="Georgia, serif">today</text>
  <rect x="80" y="268" width="10" height="10" fill="#3D4E8A" rx="1"/>
  <text x="95" y="277" font-size="10" fill="#3D4E8A" font-family="Georgia, serif">2026–28</text>

  <!-- ══════════════════════════════════════════════════
       STAGE 1 — RAW MATERIALS  x=160
       Today: ~$1M  2026–28: $3–6M
  ═════════════════════════════════════════════════════= -->
  <!-- indigo (2026-28) taller bar, behind -->
  <rect x="126" y="152" width="68" height="96" fill="#3D4E8A" opacity="0.85" rx="2"/>
  <!-- coral (today) shorter bar, in front -->
  <rect x="134" y="224" width="52" height="24" fill="#C0503A" rx="2"/>
  <!-- range label indigo -->
  <text x="160" y="148" text-anchor="middle" font-size="10" fill="#3D4E8A"
        font-family="Georgia, serif">$3–6M</text>
  <!-- today label coral -->
  <text x="160" y="221" text-anchor="middle" font-size="10" fill="#C0503A"
        font-family="Georgia, serif">~$1M</text>

  <!-- ══════════════════════════════════════════════════
       STAGE 2 — MANUFACTURING  x=300
       Today: ~$2M  2026–28: $6–12M
  ═════════════════════════════════════════════════════= -->
  <rect x="266" y="128" width="68" height="120" fill="#3D4E8A" opacity="0.85" rx="2"/>
  <rect x="274" y="218" width="52" height="30" fill="#C0503A" rx="2"/>
  <text x="300" y="124" text-anchor="middle" font-size="10" fill="#3D4E8A"
        font-family="Georgia, serif">$6–12M</text>
  <text x="300" y="215" text-anchor="middle" font-size="10" fill="#C0503A"
        font-family="Georgia, serif">~$2M</text>

  <!-- ══════════════════════════════════════════════════
       STAGE 3 — DISTRIBUTION  x=440
       Today: ~$1M  2026–28: $4–8M
  ═════════════════════════════════════════════════════= -->
  <rect x="406" y="160" width="68" height="88" fill="#3D4E8A" opacity="0.85" rx="2"/>
  <rect x="414" y="228" width="52" height="20" fill="#C0503A" rx="2"/>
  <text x="440" y="156" text-anchor="middle" font-size="10" fill="#3D4E8A"
        font-family="Georgia, serif">$4–8M</text>
  <text x="440" y="225" text-anchor="middle" font-size="10" fill="#C0503A"
        font-family="Georgia, serif">~$1M</text>

  <!-- ══════════════════════════════════════════════════
       STAGE 4 — USE  x=600  ← THE GAP
       Today: ~$0  2026–28: $20–55M
  ═════════════════════════════════════════════════════= -->
  <!-- indigo very tall -->
  <rect x="562" y="62" width="76" height="186" fill="#3D4E8A" opacity="0.85" rx="2"/>
  <!-- coral almost invisible — today cost ~$0 -->
  <rect x="572" y="244" width="56" height="4" fill="#C0503A" rx="1"/>
  <text x="600" y="58" text-anchor="middle" font-size="10" fill="#3D4E8A"
        font-family="Georgia, serif">$20–55M</text>
  <!-- "~$0" label for today, below baseline -->
  <text x="600" y="265" text-anchor="middle" font-size="9.5" fill="#C0503A"
        font-family="Georgia, serif">~$0</text>

  <!-- GAP ANNOTATION -->
  <line x1="652" y1="68" x2="652" y2="244" stroke="#C0503A" stroke-width="0.8"
        stroke-dasharray="3 3"/>
  <text x="656" y="100" font-size="9" fill="#C0503A" font-family="Georgia, serif">methodology</text>
  <text x="656" y="111" font-size="9" fill="#C0503A" font-family="Georgia, serif">gap</text>
  <path d="M655 68 L650 75 M655 68 L660 75" fill="none" stroke="#C0503A" stroke-width="0.8"/>
  <path d="M655 244 L650 237 M655 244 L660 237" fill="none" stroke="#C0503A" stroke-width="0.8"/>

  <!-- ══════════════════════════════════════════════════
       STAGE 5 — END OF LIFE  x=760
       Today: ~$2M  2026–28: $8–18M
  ═════════════════════════════════════════════════════= -->
  <rect x="724" y="140" width="68" height="108" fill="#3D4E8A" opacity="0.85" rx="2"/>
  <rect x="732" y="218" width="52" height="30" fill="#C0503A" rx="2"/>
  <text x="758" y="136" text-anchor="middle" font-size="10" fill="#3D4E8A"
        font-family="Georgia, serif">$8–18M</text>
  <text x="758" y="215" text-anchor="middle" font-size="10" fill="#C0503A"
        font-family="Georgia, serif">~$2M</text>

  <!-- ══════════════════════════════════════════════════
       STAGE AXIS LINE
  ═════════════════════════════════════════════════════= -->
  <line x1="80" y1="290" x2="840" y2="290" stroke="#888" stroke-width="1"/>
  <polygon points="840,287 848,290 840,293" fill="#888"/>

  <!-- tick marks -->
  <line x1="160" y1="287" x2="160" y2="295" stroke="#888" stroke-width="0.8"/>
  <line x1="300" y1="287" x2="300" y2="295" stroke="#888" stroke-width="0.8"/>
  <line x1="440" y1="287" x2="440" y2="295" stroke="#888" stroke-width="0.8"/>
  <line x1="600" y1="287" x2="600" y2="295" stroke="#888" stroke-width="0.8"/>
  <line x1="760" y1="287" x2="760" y2="295" stroke="#888" stroke-width="0.8"/>

  <!-- STAGE LABEL — right edge -->
  <text x="862" y="294" font-size="10" fill="#888" font-family="Georgia, serif">stage</text>

  <!-- ══════════════════════════════════════════════════
       STAGE NAMES + SUB-LABELS
  ═════════════════════════════════════════════════════= -->
  <text x="160" y="310" text-anchor="middle" font-size="12" font-weight="700"
        fill="#222" font-family="Georgia, serif">Raw materials</text>
  <text x="160" y="325" text-anchor="middle" font-size="10" fill="#666"
        font-family="Georgia, serif">Rubber · carbon black</text>

  <text x="300" y="310" text-anchor="middle" font-size="12" font-weight="700"
        fill="#222" font-family="Georgia, serif">Manufacturing</text>
  <text x="300" y="325" text-anchor="middle" font-size="10" fill="#666"
        font-family="Georgia, serif">Compounding · curing</text>

  <text x="440" y="310" text-anchor="middle" font-size="12" font-weight="700"
        fill="#222" font-family="Georgia, serif">Distribution</text>
  <text x="440" y="325" text-anchor="middle" font-size="10" fill="#666"
        font-family="Georgia, serif">Brand · fleet</text>

  <text x="600" y="310" text-anchor="middle" font-size="12" font-weight="700"
        fill="#222" font-family="Georgia, serif">Use</text>
  <text x="600" y="325" text-anchor="middle" font-size="10" fill="#666"
        font-family="Georgia, serif">Consumer · roads</text>

  <text x="760" y="310" text-anchor="middle" font-size="12" font-weight="700"
        fill="#222" font-family="Georgia, serif">End of life</text>
  <text x="760" y="325" text-anchor="middle" font-size="10" fill="#666"
        font-family="Georgia, serif">Landfill · waterway</text>

  <!-- ══════════════════════════════════════════════════
       POLYMER SHARE ROW — bubbles
       ~12%  ~6%  ~2%  ~64%  ~16%
       Max bubble r=28 (64%), scaled proportionally
  ═════════════════════════════════════════════════════= -->

  <!-- POLYMER RELEASED label -->
  <text x="42" y="375" font-size="9.5" fill="#C0503A" font-weight="700"
        font-family="Georgia, serif">TWP</text>
  <text x="42" y="388" font-size="9.5" fill="#C0503A" font-weight="700"
        font-family="Georgia, serif">released</text>

  <!-- share label axis -->
  <text x="862" y="380" font-size="10" fill="#888" font-family="Georgia, serif">share</text>

  <!-- Raw materials ~12% → r=12 -->
  <circle cx="148" cy="375" r="10" fill="#C0503A" opacity="0.75"/>
  <circle cx="168" cy="380" r="7"  fill="#C0503A" opacity="0.5"/>
  <text x="160" y="400" text-anchor="middle" font-size="11" fill="#555"
        font-family="Georgia, serif">~12%</text>

  <!-- Manufacturing ~6% → r=7 -->
  <circle cx="300" cy="378" r="7" fill="#C0503A" opacity="0.65"/>
  <text x="300" y="400" text-anchor="middle" font-size="11" fill="#555"
        font-family="Georgia, serif">~6%</text>

  <!-- Distribution ~2% → r=4 -->
  <circle cx="440" cy="380" r="4" fill="#C0503A" opacity="0.6"/>
  <text x="440" y="400" text-anchor="middle" font-size="11" fill="#555"
        font-family="Georgia, serif">~2%</text>

  <!-- Use ~64% → large cluster of bubbles -->
  <circle cx="583" cy="368" r="26" fill="#C0503A" opacity="0.8"/>
  <circle cx="613" cy="374" r="16" fill="#C0503A" opacity="0.6"/>
  <circle cx="598" cy="390" r="10" fill="#C0503A" opacity="0.5"/>
  <circle cx="576" cy="390" r="7"  fill="#C0503A" opacity="0.45"/>
  <text x="600" y="412" text-anchor="middle" font-size="11" fill="#555"
        font-family="Georgia, serif">~64%</text>

  <!-- End of life ~16% → r=14 -->
  <circle cx="750" cy="372" r="13" fill="#C0503A" opacity="0.7"/>
  <circle cx="771" cy="378" r="8"  fill="#C0503A" opacity="0.5"/>
  <text x="760" y="400" text-anchor="middle" font-size="11" fill="#555"
        font-family="Georgia, serif">~16%</text>

  <!-- ══════════════════════════════════════════════════
       TOTAL ROW
  ═════════════════════════════════════════════════════= -->
  <line x1="80" y1="430" x2="840" y2="430" stroke="#ddd" stroke-width="0.8"/>

  <!-- total label axis -->
  <text x="862" y="470" font-size="10" fill="#888" font-family="Georgia, serif">total</text>

  <!-- today total -->
  <text x="200" y="460" text-anchor="middle" font-size="14" fill="#C0503A"
        font-family="Georgia, serif" font-weight="700">~$6M / yr</text>
  <text x="200" y="476" text-anchor="middle" font-size="10" fill="#C0503A"
        font-family="Georgia, serif">today, total cost</text>
  <text x="200" y="490" text-anchor="middle" font-size="10" fill="#666"
        font-family="Georgia, serif">mostly SB 1422 compliance fees</text>

  <!-- growth arrow -->
  <line x1="310" y1="464" x2="530" y2="464" stroke="#888" stroke-width="1.2"/>
  <polygon points="530,461 538,464 530,467" fill="#888"/>
  <text x="420" y="458" text-anchor="middle" font-size="10" fill="#888"
        font-family="Georgia, serif">5–10× growth</text>

  <!-- 2026-28 total -->
  <text x="660" y="460" text-anchor="middle" font-size="14" fill="#3D4E8A"
        font-family="Georgia, serif" font-weight="700">$41–99M / yr</text>
  <text x="660" y="476" text-anchor="middle" font-size="10" fill="#3D4E8A"
        font-family="Georgia, serif">2026–28, total cost</text>
  <text x="660" y="490" text-anchor="middle" font-size="10" fill="#666"
        font-family="Georgia, serif">mostly use-phase regulation</text>

  <!-- ══════════════════════════════════════════════════
       FOOTER CALLOUT
  ═════════════════════════════════════════════════════= -->
  <line x1="40" y1="516" x2="840" y2="516" stroke="#ddd" stroke-width="0.8"/>
  <text x="40" y="533" font-size="10.5" fill="#333" font-family="Georgia, serif">
    64% of TWP leaves the tire at the use stage — but that stage carries ~$0 of priced cost today.
  </text>
  <text x="40" y="549" font-size="10.5" fill="#333" font-family="Georgia, serif">
    By 2028 it carries the largest cost share. That gap is the methodology gap.
  </text>

</svg>
